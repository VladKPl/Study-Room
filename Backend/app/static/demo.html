<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Course API Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; max-width: 1080px; }
    h1, h2 { margin: 0 0 8px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
    .field { min-width: 120px; }
    label { display: block; font-size: 13px; margin-bottom: 4px; }
    input, select, button { padding: 8px; }
    button { cursor: pointer; }
    button[disabled] { opacity: 0.6; cursor: not-allowed; }
    .caps { font-size: 14px; margin-top: 8px; }
    .hint { font-size: 13px; color: #444; margin-top: 4px; }
    #detail, #log { white-space: pre-wrap; background: #f7f7f7; padding: 10px; border-radius: 8px; min-height: 50px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <h1>Course API Demo</h1>
  <p>Demo for RBAC and DB-backed operations.</p>

  <div class="card">
    <h2>Context</h2>
    <div class="row">
      <div class="field">
        <label for="role">X-Role</label>
        <select id="role" onchange="updateRoleUi()">
          <option value="guest">guest</option>
          <option value="student">student</option>
          <option value="author">author</option>
          <option value="admin">admin</option>
        </select>
      </div>
      <div class="field">
        <label for="user_id">X-User-Id (for author)</label>
        <input id="user_id" type="number" min="1" placeholder="e.g. 1" />
      </div>
    </div>
    <div id="caps" class="caps"></div>
  </div>

  <div class="card">
    <h2>Create Course (author/admin)</h2>
    <div class="row">
      <div class="field"><label for="new_title">Title</label><input id="new_title" /></div>
      <div class="field"><label for="new_price">Price</label><input id="new_price" type="number" min="0" /></div>
      <div class="field"><label for="new_category_id">Category ID</label><input id="new_category_id" type="number" min="1" /></div>
      <div class="field">
        <label for="new_status">Status</label>
        <select id="new_status">
          <option value="draft">draft</option>
          <option value="published">published</option>
        </select>
      </div>
      <div class="field"><label>&nbsp;</label><button data-action="create" onclick="createCourse()">Create</button></div>
    </div>
    <div class="hint">Author must pass valid `X-User-Id` to create own course.</div>
  </div>

  <div class="card">
    <h2>List Courses</h2>
    <div class="row">
      <div class="field"><label for="q">Query</label><input id="q" /></div>
      <div class="field"><label for="min_price">Min price</label><input id="min_price" type="number" min="0" /></div>
      <div class="field"><label for="max_price">Max price</label><input id="max_price" type="number" min="0" /></div>
      <div class="field">
        <label for="sort">Sort</label>
        <select id="sort">
          <option value="price_asc">price_asc</option>
          <option value="price_desc">price_desc</option>
        </select>
      </div>
      <div class="field"><label for="page">Page</label><input id="page" type="number" min="1" value="1" /></div>
      <div class="field"><label for="page_size">Page size</label><input id="page_size" type="number" min="1" max="100" value="10" /></div>
      <div class="field"><label>&nbsp;</label><button onclick="listCourses()">Load</button></div>
    </div>
    <table>
      <thead>
        <tr><th>ID</th><th>Title</th><th>Price</th><th>Author ID</th><th>Actions</th></tr>
      </thead>
      <tbody id="courses"></tbody>
    </table>
    <div class="hint">If empty, DB may have no published courses.</div>
  </div>

  <div class="card">
    <h2>Course Detail</h2>
    <div class="row">
      <div class="field"><label for="course_id">Course ID</label><input id="course_id" type="number" min="1" /></div>
      <div class="field"><label>&nbsp;</label><button onclick="getCourse()">View Card</button></div>
    </div>
    <div id="detail"></div>
  </div>

  <div class="card">
    <h2>Actions By Course ID</h2>
    <div class="row">
      <div class="field"><label for="action_course_id">Course ID</label><input id="action_course_id" type="number" min="1" /></div>
      <div class="field"><label>&nbsp;</label><button data-action="start" onclick="runAction('start')">start</button></div>
      <div class="field"><label>&nbsp;</label><button data-action="hide" onclick="runAction('hide')">hide</button></div>
      <div class="field"><label>&nbsp;</label><button data-action="ban" onclick="runAction('ban')">ban</button></div>
      <div class="field"><label>&nbsp;</label><button data-action="soft" onclick="runAction('soft')">soft delete</button></div>
      <div class="field"><label>&nbsp;</label><button data-action="hard" onclick="runAction('hard')">hard delete</button></div>
    </div>
  </div>

  <div class="card">
    <h2>Response Log</h2>
    <div id="log"></div>
  </div>

  <script>
    const apiBase = "/api/v1";
    const permissions = {
      guest:   { read: true,  create: false, start: false, hide: false, ban: false, soft: false, hard: false },
      student: { read: true,  create: false, start: true,  hide: false, ban: false, soft: false, hard: false },
      author:  { read: true,  create: true,  start: true,  hide: true,  ban: false, soft: true,  hard: false },
      admin:   { read: true,  create: true,  start: true,  hide: true,  ban: true,  soft: true,  hard: true  }
    };

    function currentRole() {
      return document.getElementById("role").value;
    }

    function currentUserId() {
      return document.getElementById("user_id").value;
    }

    function roleHeaders() {
      const headers = { "X-Role": currentRole() };
      const uid = currentUserId();
      if (uid) headers["X-User-Id"] = uid;
      return headers;
    }

    function can(action) {
      return !!permissions[currentRole()][action];
    }

    function log(status, payload) {
      const text = typeof payload === "string" ? payload : JSON.stringify(payload, null, 2);
      document.getElementById("log").textContent = `status: ${status}\n${text}`;
    }

    async function call(path, opts = {}) {
      const res = await fetch(path, {
        ...opts,
        headers: { ...(opts.headers || {}), ...roleHeaders() }
      });
      let body;
      try {
        body = await res.json();
      } catch (_) {
        body = await res.text();
      }
      log(res.status, body);
      return { res, body };
    }

    function updateRoleUi() {
      const role = currentRole();
      document.getElementById("caps").textContent =
        `role=${role} | create=${can("create")} | start=${can("start")} | hide=${can("hide")} | ban=${can("ban")} | soft=${can("soft")} | hard=${can("hard")}`;
      for (const btn of document.querySelectorAll("button[data-action]")) {
        btn.disabled = !can(btn.dataset.action);
      }
      renderCourses(window.lastCourses || []);
    }

    function actionButtons(id) {
      const buttons = ["start", "hide", "ban", "soft", "hard"];
      const div = document.createElement("div");
      div.className = "actions";
      for (const type of buttons) {
        const b = document.createElement("button");
        b.textContent = type;
        b.disabled = !can(type);
        b.onclick = () => action(type, id);
        div.appendChild(b);
      }
      return div;
    }

    function renderCourses(rows) {
      window.lastCourses = rows;
      const tbody = document.getElementById("courses");
      tbody.innerHTML = "";
      if (!rows.length) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="5">No courses found.</td>`;
        tbody.appendChild(tr);
        return;
      }
      for (const c of rows) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${c.id}</td><td>${c.title}</td><td>${c.price}</td><td>${c.author_id ?? "-"}</td><td></td>`;
        tr.children[4].appendChild(actionButtons(c.id));
        tbody.appendChild(tr);
      }
    }

    async function createCourse() {
      if (!can("create")) {
        log(0, "Current role cannot create courses");
        return;
      }
      const payload = {
        title: document.getElementById("new_title").value,
        price: Number(document.getElementById("new_price").value),
        category_id: Number(document.getElementById("new_category_id").value),
        status: document.getElementById("new_status").value
      };
      const { res } = await call(`${apiBase}/courses`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (res.status === 200) listCourses();
    }

    async function listCourses() {
      const params = new URLSearchParams();
      for (const field of ["q", "min_price", "max_price", "sort", "page", "page_size"]) {
        const value = document.getElementById(field).value;
        if (value !== "") params.set(field, value);
      }
      const { body } = await call(`${apiBase}/courses?${params.toString()}`);
      renderCourses(Array.isArray(body.data) ? body.data : []);
    }

    async function getCourse() {
      const id = document.getElementById("course_id").value;
      if (!id) return log(0, "Enter course ID");
      const { body } = await call(`${apiBase}/courses/${id}`);
      document.getElementById("detail").textContent = JSON.stringify(body, null, 2);
    }

    async function action(type, courseId) {
      if (type === "start") return call(`${apiBase}/courses/${courseId}/start`, { method: "POST" });
      if (type === "hide") return call(`${apiBase}/courses/${courseId}/hide`, { method: "PATCH" });
      if (type === "ban") return call(`${apiBase}/courses/${courseId}/ban`, { method: "PATCH" });
      if (type === "soft") return call(`${apiBase}/courses/${courseId}`, { method: "DELETE" });
      if (type === "hard") return call(`${apiBase}/courses/${courseId}/hard-delete`, { method: "DELETE" });
    }

    function runAction(type) {
      const id = document.getElementById("action_course_id").value;
      if (!id) return log(0, "Enter course ID");
      action(type, id);
    }

    updateRoleUi();
  </script>
</body>
</html>
